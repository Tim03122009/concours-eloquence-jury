<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>Vidéo — Concours d'éloquence</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #eee;
        }
        #video-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
        }
        #progress-dot {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 4.5px;
            height: 4.5px;
            border-radius: 50%;
            background: #fff;
            z-index: 1;
            pointer-events: none;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
        }
        #video-container video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            outline: none;
        }
        /* Panneau arborescence style DJ */
        #tree-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            max-width: 85vw;
            height: 100%;
            background: rgba(18, 18, 22, 0.98);
            border-right: 1px solid #333;
            z-index: 10;
            display: none;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0,0,0,0.5);
        }
        #tree-panel.open {
            display: flex;
        }
        #tree-header {
            padding: 12px 16px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        #tree-header h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
        }
        #tree-choose-dir {
            padding: 8px 14px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        #tree-choose-dir:hover {
            background: #2563eb;
        }
        #tree-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .tree-item {
            padding: 6px 12px 6px 24px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            word-break: break-all;
        }
        .tree-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .tree-item.video-file {
            color: #93c5fd;
        }
        .tree-item.video-file:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        .tree-item.video-file.playing {
            background: rgba(59, 130, 246, 0.35);
            color: #fff;
            font-weight: 600;
        }
        .tree-item.video-file.playing::before {
            content: '▶ ';
            font-size: 0.75em;
        }
        .tree-progress-block {
            padding: 8px 12px 10px 24px;
            margin-bottom: 4px;
        }
        .tree-progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .tree-progress-fill {
            height: 100%;
            background: #3b82f6;
            border-radius: 3px;
            width: 0%;
            transition: width 0.15s linear;
        }
        .tree-progress-time {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .tree-dir {
            padding-left: 8px;
        }
        .tree-dir .tree-toggle {
            width: 18px;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
        }
        .tree-dir.expanded .tree-toggle::before {
            content: '▼';
        }
        .tree-dir:not(.expanded) .tree-toggle::before {
            content: '▶';
        }
        .tree-children {
            display: none;
        }
        .tree-dir.expanded .tree-children {
            display: block;
        }
        .tree-loading {
            color: #666;
            font-style: italic;
        }
        .tree-empty {
            padding: 16px;
            color: #666;
            text-align: center;
            font-size: 0.9rem;
        }
        .tree-hint {
            padding: 12px 16px;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px solid #333;
        }
        .tree-shared-section {
            padding: 10px 16px;
            border-bottom: 1px solid #333;
        }
        .tree-shared-section label {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .tree-shared-section input {
            width: 100%;
            box-sizing: border-box;
            padding: 6px 8px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            border-radius: 4px;
            color: #eee;
            font-size: 0.85rem;
        }
        .tree-shared-section button {
            width: 100%;
            padding: 6px;
            background: #0ea5e9;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .tree-shared-section button:hover {
            background: #0284c7;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <div id="progress-dot" aria-hidden="true"></div>
        <video id="video" tabindex="0" autoplay playsinline></video>
    </div>
    <div id="tree-panel" aria-hidden="true">
        <div class="tree-shared-section">
            <label for="shared-video-url">Vidéo partagée (tous les appareils)</label>
            <input type="url" id="shared-video-url" placeholder="https://... (URL publique)">
            <button type="button" id="shared-video-apply">Définir pour tous</button>
        </div>
        <div id="tree-header">
            <h2>Dossier</h2>
            <button type="button" id="tree-choose-dir">Choisir un dossier</button>
        </div>
        <div id="tree-list">
            <div class="tree-empty">Ctrl+A pour ouvrir/fermer. Cliquez sur « Choisir un dossier » pour parcourir vos fichiers.</div>
        </div>
        <div class="tree-hint">Espace : lecture / pause — Entrée : recommencer — Ctrl+A : fermer</div>
    </div>

    <script>
        (async function() {
            const VIDEO_EXTS = new Set(['.mp4', '.webm', '.mov', '.avi', '.mkv', '.m4v', '.ogv']);
            const video = document.getElementById('video');
            const progressDot = document.getElementById('progress-dot');
            const treePanel = document.getElementById('tree-panel');
            const treeList = document.getElementById('tree-list');
            const chooseDirBtn = document.getElementById('tree-choose-dir');
            let rootHandle = null;

            let videoSyncUnsubscribe = null;
            let applyingRemote = false;
            let syncMode = false;
            let lastSharedVideoUrl = '';
            let lastSyncData = null;
            let pushState = function() {};

            try {
                const { db } = await import('./firebase-init.js');
                const { doc, onSnapshot, setDoc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore.js');
                const VIDEO_SYNC_REF = doc(db, 'config', 'videoSync');

                pushState = function() {
                    if (applyingRemote || !video.src) return;
                    const d = video.duration;
                    const t = video.currentTime;
                    setDoc(VIDEO_SYNC_REF, {
                        sharedVideoUrl: lastSharedVideoUrl || '',
                        sharedVideoName: lastSharedVideoUrl ? (video.src || '') : '',
                        paused: video.paused,
                        currentTime: isFinite(t) ? t : 0,
                        syncTimestamp: Date.now(),
                        syncVideoTime: video.paused ? t : (isFinite(t) ? t : 0)
                    }, { merge: true }).catch(() => {});
                }

                videoSyncUnsubscribe = onSnapshot(VIDEO_SYNC_REF, (snap) => {
                    if (!snap.exists()) return;
                    const data = snap.data();
                    lastSyncData = data;
                    applyingRemote = true;
                    const url = (data.sharedVideoUrl || '').trim();
                    const sharedInput = document.getElementById('shared-video-url');
                    if (sharedInput) sharedInput.value = url;
                    if (url && url !== video.src) {
                        lastSharedVideoUrl = url;
                        syncMode = true;
                        if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
                        video.src = url;
                        video.load();
                        video.pause();
                    } else if (url) {
                        lastSharedVideoUrl = url;
                        syncMode = true;
                    } else {
                        lastSharedVideoUrl = '';
                        syncMode = false;
                    }
                    const now = Date.now();
                    const st = data.syncTimestamp || 0;
                    const sv = data.syncVideoTime || 0;
                    if (data.paused) {
                        video.pause();
                        video.currentTime = Math.max(0, data.currentTime != null ? data.currentTime : video.currentTime);
                    } else {
                        const targetTime = sv + (now - st) / 1000;
                        video.currentTime = Math.max(0, targetTime);
                        video.play().catch(() => {});
                    }
                    updateProgressDot();
                    updateTreeProgressBlock();
                    applyingRemote = false;
                });

                document.getElementById('shared-video-apply').addEventListener('click', async () => {
                    const input = document.getElementById('shared-video-url');
                    const url = (input.value || '').trim();
                    if (!url) return;
                    try {
                        await setDoc(VIDEO_SYNC_REF, {
                            sharedVideoUrl: url,
                            sharedVideoName: url,
                            paused: true,
                            currentTime: 0,
                            syncTimestamp: Date.now(),
                            syncVideoTime: 0
                        }, { merge: true });
                    } catch (e) {
                        console.error(e);
                    }
                });

                getDoc(VIDEO_SYNC_REF).then(snap => {
                    if (snap.exists() && (snap.data().sharedVideoUrl || '').trim()) {
                        document.getElementById('shared-video-url').value = (snap.data().sharedVideoUrl || '').trim();
                    }
                }).catch(() => {});
            } catch (e) {
                console.warn('Firebase non disponible, mode local uniquement.', e);
            }

            function updateProgressDot() {
                if (!video.src) return;
                const d = video.duration;
                if (!d || !isFinite(d)) {
                    progressDot.style.background = '#fff';
                    return;
                }
                if (video.ended) {
                    progressDot.style.background = '#fff';
                    return;
                }
                const t = Math.min(1, video.currentTime / d);
                const r = 255;
                const g = Math.round(255 * (1 - t));
                const b = Math.round(255 * (1 - t));
                progressDot.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
            }

            video.addEventListener('timeupdate', updateProgressDot);
            video.addEventListener('ended', () => {
                progressDot.style.background = '#fff';
            });
            video.addEventListener('loadedmetadata', updateProgressDot);

            function formatTime(seconds) {
                if (!isFinite(seconds) || seconds < 0) return '0:00';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return m + ':' + (s < 10 ? '0' : '') + s;
            }

            function createProgressBlock() {
                const block = document.createElement('div');
                block.className = 'tree-progress-block';
                block.id = 'tree-progress-block';
                block.innerHTML = '<div class="tree-progress-bar"><div class="tree-progress-fill"></div></div><div class="tree-progress-time">0:00 restant</div>';
                const bar = block.querySelector('.tree-progress-bar');
                bar.addEventListener('click', (e) => {
                    if (!video.src) return;
                    const d = video.duration;
                    if (!d || !isFinite(d)) return;
                    const rect = bar.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const ratio = Math.max(0, Math.min(1, x / rect.width));
                    video.currentTime = ratio * d;
                    updateTreeProgressBlock();
                    updateProgressDot();
                    if (syncMode) pushState();
                });
                return block;
            }

            function updateTreeProgressBlock() {
                const block = document.getElementById('tree-progress-block');
                if (!block) return;
                const d = video.duration;
                const t = video.currentTime;
                if (!d || !isFinite(d)) {
                    block.querySelector('.tree-progress-fill').style.width = '0%';
                    block.querySelector('.tree-progress-time').textContent = '0:00 restant';
                    return;
                }
                const pct = Math.min(100, (t / d) * 100);
                const remaining = Math.max(0, d - t);
                block.querySelector('.tree-progress-fill').style.width = pct + '%';
                block.querySelector('.tree-progress-time').textContent = formatTime(remaining) + ' restant';
            }

            function attachProgressBlockToPlayingItem(playingItem) {
                const existing = document.getElementById('tree-progress-block');
                if (existing) existing.remove();
                const block = createProgressBlock();
                playingItem.insertAdjacentElement('afterend', block);
                updateTreeProgressBlock();
            }

            video.addEventListener('timeupdate', updateTreeProgressBlock);
            video.addEventListener('loadedmetadata', updateTreeProgressBlock);
            video.addEventListener('ended', () => { updateTreeProgressBlock(); });

            // Correction régulière pour garder toutes les vidéos parfaitement synchronisées
            video.addEventListener('timeupdate', () => {
                if (!syncMode || applyingRemote || !lastSyncData) return;
                const d = video.duration;
                if (!d || !isFinite(d)) return;
                if (video.paused || lastSyncData.paused) return;
                const now = Date.now();
                const st = lastSyncData.syncTimestamp || 0;
                const sv = lastSyncData.syncVideoTime || 0;
                const expected = sv + (now - st) / 1000;
                const diff = video.currentTime - expected;
                if (Math.abs(diff) > 0.15) {
                    video.currentTime = Math.max(0, expected);
                }
            });

            function isVideoFile(name) {
                const ext = name.slice(name.lastIndexOf('.')).toLowerCase();
                return VIDEO_EXTS.has(ext);
            }

            function renderEmpty() {
                treeList.innerHTML = '<div class="tree-empty">Ctrl+A pour ouvrir/fermer. Cliquez sur « Choisir un dossier » pour parcourir vos fichiers.</div>';
            }

            function renderLoading(parentEl) {
                const wrap = document.createElement('div');
                wrap.className = 'tree-children';
                wrap.innerHTML = '<div class="tree-item tree-loading">Chargement…</div>';
                parentEl.appendChild(wrap);
                return wrap;
            }

            async function loadDir(handle, parentEl) {
                const children = parentEl.querySelector('.tree-children');
                if (children && children.dataset.loaded === '1') return;
                const placeholder = parentEl.querySelector('.tree-loading');
                if (placeholder) placeholder.remove();
                let container = parentEl.querySelector('.tree-children');
                if (!container) {
                    container = document.createElement('div');
                    container.className = 'tree-children';
                    parentEl.appendChild(container);
                }
                container.innerHTML = '<div class="tree-item tree-loading">Chargement…</div>';
                const entries = [];
                try {
                    for await (const entry of handle.values()) {
                        entries.push(entry);
                    }
                } catch (e) {
                    container.innerHTML = '<div class="tree-item tree-empty">Erreur lecture</div>';
                    return;
                }
                entries.sort((a, b) => {
                    const aIsDir = a.kind === 'directory' ? 0 : 1;
                    const bIsDir = b.kind === 'directory' ? 0 : 1;
                    if (aIsDir !== bIsDir) return aIsDir - bIsDir;
                    return String(a.name).localeCompare(String(b.name), undefined, { sensitivity: 'base' });
                });
                container.innerHTML = '';
                for (const entry of entries) {
                    if (entry.kind === 'directory') {
                        const div = document.createElement('div');
                        div.className = 'tree-dir tree-item';
                        div.innerHTML = '<span class="tree-toggle"></span>';
                        const span = document.createElement('span');
                        span.textContent = entry.name;
                        div.appendChild(span);
                        div.addEventListener('click', (e) => {
                            e.stopPropagation();
                            div.classList.toggle('expanded');
                            loadDir(entry, div);
                        });
                        container.appendChild(div);
                    } else {
                        const div = document.createElement('div');
                        div.className = 'tree-item' + (isVideoFile(entry.name) ? ' video-file' : '');
                        div.textContent = entry.name;
                        if (isVideoFile(entry.name)) {
                            div.addEventListener('click', async (e) => {
                                e.stopPropagation();
                                try {
                                    const file = await entry.getFile();
                                    const url = URL.createObjectURL(file);
                                    if (video.src) URL.revokeObjectURL(video.src);
                                    video.src = url;
                                    video.load();
                                    video.pause();
                                    syncMode = false;
                                    document.querySelectorAll('.tree-item.video-file').forEach(el => el.classList.remove('playing'));
                                    div.classList.add('playing');
                                    attachProgressBlockToPlayingItem(div);
                                } catch (err) {
                                    console.error(err);
                                }
                            });
                        }
                        container.appendChild(div);
                    }
                }
                container.dataset.loaded = '1';
            }

            async function pickFolder() {
                if (typeof window.showDirectoryPicker !== 'function') {
                    treeList.innerHTML = '<div class="tree-empty">Votre navigateur ne supporte pas la sélection de dossier. Utilisez un navigateur récent (Chrome, Edge).</div>';
                    return;
                }
                try {
                    rootHandle = await window.showDirectoryPicker();
                    treeList.innerHTML = '';
                    const rootItem = document.createElement('div');
                    rootItem.className = 'tree-dir tree-item expanded';
                    rootItem.innerHTML = '<span class="tree-toggle"></span><span>' + rootHandle.name + '</span>';
                    rootItem.addEventListener('click', (e) => {
                        e.stopPropagation();
                        rootItem.classList.toggle('expanded');
                        if (rootItem.classList.contains('expanded')) loadDir(rootHandle, rootItem);
                    });
                    treeList.appendChild(rootItem);
                    await loadDir(rootHandle, rootItem);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        treeList.innerHTML = '<div class="tree-empty">Erreur : ' + (err.message || 'annulé') + '</div>';
                    }
                }
            }

            function togglePanel() {
                const open = treePanel.classList.toggle('open');
                treePanel.setAttribute('aria-hidden', open ? 'false' : 'true');
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'a' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    togglePanel();
                    return;
                }
                if (e.key === ' ') {
                    e.preventDefault();
                    if (video.src) {
                        if (video.paused) video.play();
                        else video.pause();
                        if (syncMode) pushState();
                    }
                    return;
                }
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (video.src) {
                        video.currentTime = 0;
                        video.pause();
                        if (syncMode) pushState();
                    }
                }
            });

            chooseDirBtn.addEventListener('click', pickFolder);
            video.addEventListener('click', () => {
                if (!video.src) return;
                if (video.paused) video.play();
                else video.pause();
                if (syncMode) pushState();
            });

            if (!rootHandle) renderEmpty();
        })();
    </script>
</body>
</html>
